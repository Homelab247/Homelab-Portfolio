global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node-exporter
    static_configs:
      - targets:
          - monitoring-lxc.example.internal:9100
          - docker-services-lxc.example.internal:9100

# Hinweis:
# In der Live-Umgebung werden hier private interne Ziele verwendet.
# Für das öffentliche Portfolio sind sie bewusst anonymisiert.
