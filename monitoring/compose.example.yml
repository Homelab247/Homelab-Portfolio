services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.example.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    command:
      - --path.rootfs=/host
    ports:
      - "9100:9100"
    volumes:
      - /:/host:ro,rslave

volumes:
  prometheus-data:

# Bereinigtes Beispiel für das öffentliche Portfolio.
# Uptime Kuma und Grafana werden hier nicht überschrieben, weil sie in der Live-Umgebung bereits bestehen.
# Private IP-Adressen und Passwörter gehören nicht in dieses Repository.
